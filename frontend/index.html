<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPS Tactical Dashboard</title>
    <style>
        /* High-End Aerospace UI */
        
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body {
            margin: 0;
            overflow: hidden;
            background-color: #020202;
            color: #e0e0e0;
            font-family: 'Share Tech Mono', monospace;
        }
        /* Glassmorphism Panel */
        
        #hud-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            width: 320px;
            background: rgba(10, 15, 20, 0.65);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 204, 0.3);
            border-left: 4px solid #00ffcc;
            padding: 25px;
            border-radius: 4px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        
        h1 {
            font-size: 1.1rem;
            color: #00ffcc;
            letter-spacing: 2px;
            margin-top: 0;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(0, 255, 204, 0.2);
            padding-bottom: 12px;
        }
        
        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        
        .data-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
        }
        
        .value {
            font-size: 1.3rem;
            color: #fff;
            margin-top: 5px;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }
        
        #mode-box {
            grid-column: span 2;
            border-left: 3px solid #00ffcc;
        }
        
        #eqs-box {
            grid-column: span 2;
        }
        /* Critical Warning Overlay */
        
        #critical-alert {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: #ff0033;
            text-shadow: 0 0 20px #ff0033;
            border: 2px solid #ff0033;
            padding: 20px 40px;
            background: rgba(255, 0, 0, 0.1);
            display: none;
            z-index: 100;
            pointer-events: none;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
            100% {
                opacity: 1;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>
    <div id="critical-alert">SENSORY FAILURE</div>

    <div id="hud-panel">
        <h1>Layered Intelligence VPS</h1>

        <div class="data-grid">
            <div class="data-box" id="mode-box">
                <div class="label">Active Layer (Mode)</div>
                <div class="value" id="ui-mode">AWAITING TELEMETRY</div>
            </div>

            <div class="data-box" id="eqs-box">
                <div class="label">Environment Quality Score (EQS)</div>
                <div class="value" id="ui-eqs">--</div>
            </div>

            <div class="data-box">
                <div class="label">Lat (X)</div>
                <div class="value" id="ui-x">0.000m</div>
            </div>
            <div class="data-box">
                <div class="label">Lon (Y)</div>
                <div class="value" id="ui-y">0.000m</div>
            </div>
            <div class="data-box">
                <div class="label">Alt (Z)</div>
                <div class="value" id="ui-z">0.000m</div>
            </div>
            <div class="data-box">
                <div class="label">Features</div>
                <div class="value" id="ui-feat">0</div>
            </div>
        </div>
    </div>

    <script>
        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020202, 0.03);

        // Map Camera
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 8, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({
            antialias: true,
            powerPreference: "high-performance"
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- THE MAPPING ENVIRONMENT ---
        // 1. Grid with precise markings
        const gridHelper = new THREE.GridHelper(40, 40, 0x00ffcc, 0x1a1a1a);
        scene.add(gridHelper);

        // 2. XYZ Coordinate Axes (Red=X, Green=Y(Alt), Blue=Z(Depth))
        const axesHelper = new THREE.AxesHelper(5);
        scene.add(axesHelper);

        // --- THE QUADCOPTER DRONE MODEL ---
        const droneGroup = new THREE.Group();

        // Main Body
        const bodyGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.2, 8);
        const bodyMat = new THREE.MeshBasicMaterial({
            color: 0x222222,
            wireframe: true
        });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        droneGroup.add(body);

        // Core Status Light
        const coreGeo = new THREE.SphereGeometry(0.3, 16, 16);
        const coreMat = new THREE.MeshBasicMaterial({
            color: 0x00ffcc
        });
        const coreLight = new THREE.Mesh(coreGeo, coreMat);
        droneGroup.add(coreLight);

        // Arms & Rotors
        const armGeo = new THREE.BoxGeometry(2.5, 0.05, 0.1);
        const armMat = new THREE.MeshBasicMaterial({
            color: 0x555555
        });
        const arm1 = new THREE.Mesh(armGeo, armMat);
        const arm2 = new THREE.Mesh(armGeo, armMat);
        arm2.rotation.y = Math.PI / 2;
        droneGroup.add(arm1);
        droneGroup.add(arm2);

        scene.add(droneGroup);

        // --- THE MOVEMENT TRAIL (Historical Path) ---
        const MAX_TRAIL_POINTS = 300;
        const trailGeometry = new THREE.BufferGeometry();
        const trailPositions = new Float32Array(MAX_TRAIL_POINTS * 3);
        trailGeometry.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
        const trailMaterial = new THREE.LineBasicMaterial({
            color: 0x00ffcc,
            linewidth: 2,
            transparent: true,
            opacity: 0.8
        });
        const trail = new THREE.Line(trailGeometry, trailMaterial);
        scene.add(trail);

        let trailIndex = 0;

        // --- DYNAMIC DATA CONNECTION ---
        // 🚨 FRONTEND GUY: CHANGE THIS IP TO MATCH THE BACKEND TERMINAL
        const BACKEND_URL = 'http://localhost:5000/data';

        async function fetchVPSData() {
            try {
                const response = await fetch(BACKEND_URL);
                const data = await response.json();
                updateDashboard(data);
            } catch (error) {
                // Fails silently if backend drops, prevents UI crashing
            }
        }

        function updateDashboard(data) {
            // Update Precise Numbers (3 decimal places)
            document.getElementById('ui-mode').innerText = data.mode || "UNKNOWN";
            document.getElementById('ui-eqs').innerText = data.eqs_status || data.eqs || "UNKNOWN";
            document.getElementById('ui-x').innerText = (data.x || 0).toFixed(3) + "m";
            document.getElementById('ui-y').innerText = (data.y || 0).toFixed(3) + "m";
            document.getElementById('ui-z').innerText = (data.z || 0).toFixed(3) + "m";
            document.getElementById('ui-feat').innerText = data.features || 0;

            // Map Data to 3D Space (Scale for better visualization)
            const targetX = data.x * 2;
            const targetY = data.z; // Altitude
            const targetZ = data.y * 2;

            // Smooth Drone Movement
            droneGroup.position.x += (targetX - droneGroup.position.x) * 0.15;
            droneGroup.position.y += (targetY - droneGroup.position.y) * 0.15;
            droneGroup.position.z += (targetZ - droneGroup.position.z) * 0.15;

            // --- UPDATE THE TRAIL ---
            const positions = trail.geometry.attributes.position.array;
            // Shift all points back
            for (let i = MAX_TRAIL_POINTS * 3 - 1; i >= 3; i--) {
                positions[i] = positions[i - 3];
            }
            // Add new point at the front
            positions[0] = droneGroup.position.x;
            positions[1] = droneGroup.position.y;
            positions[2] = droneGroup.position.z;
            trail.geometry.attributes.position.needsUpdate = true;

            // --- INTELLIGENCE LOGIC (Colors & Alerts) ---
            const alertBox = document.getElementById('critical-alert');
            const modeBox = document.getElementById('mode-box');

            if (data.mode === "PRECISION_LANDING") {
                coreMat.color.setHex(0x00ff00); // Green Lock
                modeBox.style.borderLeftColor = "#00ff00";
                alertBox.style.display = 'none';
            } else if (String(data.eqs_status).includes("CRITICAL")) {
                coreMat.color.setHex(0xff0033); // Red Alert
                modeBox.style.borderLeftColor = "#ff0033";
                alertBox.style.display = 'block';
            } else {
                coreMat.color.setHex(0x00ffcc); // Cyan Navigating
                modeBox.style.borderLeftColor = "#00ffcc";
                alertBox.style.display = 'none';
            }
        }

        setInterval(fetchVPSData, 50); // Polling twice as fast for smoother trails

        // --- RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            // Spin the drone rotors
            droneGroup.children[2].rotation.y += 0.3;
            droneGroup.children[3].rotation.y -= 0.3;

            // Slow camera pan for cinematic effect
            camera.position.x = Math.sin(Date.now() * 0.0005) * 8;
            camera.position.z = Math.cos(Date.now() * 0.0005) * 12;
            camera.lookAt(droneGroup.position);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
